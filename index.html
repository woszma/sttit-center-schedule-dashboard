<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STTIT - 中心課表dashboard</title>
  <style>
    :root {
      --bg-top: #efe4d2;
      --bg-bottom: #cfdced;
      --panel: rgba(255, 250, 243, 0.74);
      --panel-strong: rgba(255, 255, 255, 0.84);
      --border: rgba(22, 34, 44, 0.12);
      --text: #12202b;
      --muted: #5e6e7d;
      --accent: #cb6330;
      --accent-soft: rgba(203, 99, 48, 0.14);
      --shadow: 0 28px 70px rgba(18, 32, 43, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "Avenir Next", "PingFang TC", "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.88), transparent 22%),
        radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.46), transparent 26%),
        linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
      overflow: hidden;
    }

    .tv-shell {
      position: relative;
      width: 100vw;
      min-height: 100vh;
      padding: 2.2vh 2.2vw;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 33vw 1fr;
      gap: 1.4vw;
      min-height: calc(100vh - 4.4vh);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2vw;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero {
      padding: 3.2vh 2.2vw;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5vw;
      width: fit-content;
      padding: 0.6vh 0.9vw;
      border-radius: 999px;
      background: rgba(18, 32, 43, 0.06);
      color: var(--muted);
      font-size: clamp(0.85rem, 0.95vw, 1rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .date-block h1 {
      margin: 2.2vh 0 0.8vh;
      font-size: clamp(3.3rem, 5vw, 5.8rem);
      line-height: 0.94;
      letter-spacing: -0.06em;
    }

    .date-block p {
      margin: 0;
      font-size: clamp(1.15rem, 1.35vw, 1.55rem);
      color: var(--muted);
    }

    .clock {
      margin-top: 1.6vh;
      font-size: clamp(4rem, 6.3vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.06em;
      line-height: 0.92;
      font-variant-numeric: tabular-nums;
    }

    .project-name {
      font-size: clamp(1rem, 1vw, 1.15rem);
      color: var(--muted);
    }

    .schedule {
      padding: 2.8vh 2vw;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 1.8vh;
    }

    .schedule-topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1.4vw;
    }

    .schedule-heading h2 {
      margin: 0;
      font-size: clamp(2rem, 2.5vw, 3rem);
      letter-spacing: -0.04em;
    }

    .schedule-heading p {
      margin: 0.4vh 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 1.1vw, 1.2rem);
    }

    .schedule-actions {
      display: flex;
      align-items: center;
      gap: 0.8vw;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .date-picker {
      display: flex;
      align-items: center;
      gap: 0.7vw;
      padding: 0.8vh 0.8vw;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(18, 32, 43, 0.08);
    }

    .date-picker label {
      font-size: clamp(0.95rem, 0.95vw, 1rem);
      color: var(--muted);
      white-space: nowrap;
    }

    .date-picker input {
      border: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      min-width: 10.5rem;
    }

    .ghost-button,
    .refresh-button,
    .settings button {
      border: 0;
      border-radius: 999px;
      padding: 0.95vh 1.15vw;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }

    .ghost-button {
      background: rgba(18, 32, 43, 0.08);
      color: var(--text);
    }

    .refresh-button {
      background: var(--accent);
      color: white;
    }

    .schedule-board {
      min-height: 0;
      overflow: auto;
      padding-right: 0.2vw;
    }

    .calendar-list {
      display: grid;
      gap: 1.2vh;
    }

    .event-card {
      display: grid;
      grid-template-columns: minmax(11rem, 16rem) 1fr minmax(9rem, 12rem);
      gap: 1vw;
      align-items: center;
      padding: 1.5vh 1.3vw;
      border-radius: 1.5vw;
      border: 1px solid rgba(18, 32, 43, 0.08);
      background: rgba(255, 255, 255, 0.92);
    }

    .event-card.is-muted {
      background: rgba(126, 136, 145, 0.18);
      border-color: rgba(88, 98, 108, 0.22);
    }

    .event-time {
      font-size: clamp(1rem, 1.12vw, 1.2rem);
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
    }

    .event-card.is-muted .event-time,
    .event-card.is-muted .event-title,
    .event-card.is-muted .event-note,
    .event-card.is-muted .event-location {
      color: #5b6670;
    }

    .event-main {
      min-width: 0;
    }

    .event-title {
      margin: 0;
      font-size: clamp(1.2rem, 1.5vw, 1.8rem);
      line-height: 1.2;
      word-break: break-word;
    }

    .event-note {
      margin-top: 0.5vh;
      color: var(--muted);
      font-size: clamp(0.95rem, 1vw, 1.1rem);
    }

    .event-flags {
      display: flex;
      gap: 0.45vw;
      flex-wrap: wrap;
      margin-top: 0.7vh;
    }

    .event-flag {
      display: inline-flex;
      align-items: center;
      padding: 0.35vh 0.55vw;
      border-radius: 999px;
      font-size: clamp(0.82rem, 0.86vw, 0.92rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      background: rgba(18, 32, 43, 0.08);
      color: var(--text);
    }

    .event-flag.is-cancelled,
    .event-flag.is-rescheduled {
      background: rgba(91, 102, 112, 0.18);
      color: #4d5862;
    }

    .event-location {
      justify-self: end;
      padding: 0.9vh 1vw;
      border-radius: 1vw;
      background: var(--accent-soft);
      color: var(--text);
      font-size: clamp(1.15rem, 1.45vw, 1.75rem);
      font-weight: 600;
      line-height: 1.2;
      text-align: center;
      max-width: 100%;
      word-break: break-word;
    }

    .empty-state,
    .error-state {
      min-height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      padding: 2.4vh 2vw;
      border: 1px dashed rgba(18, 32, 43, 0.18);
      border-radius: 1.7vw;
      background: rgba(255, 255, 255, 0.35);
      font-size: clamp(1.1rem, 1.2vw, 1.35rem);
    }

    .control-dock {
      position: absolute;
      top: 2.2vh;
      right: 2.2vw;
      width: min(24rem, 24vw);
      z-index: 20;
    }

    .control-dock details {
      border-radius: 1.2vw;
      background: rgba(255, 255, 255, 0.34);
      border: 1px solid rgba(18, 32, 43, 0.08);
      backdrop-filter: blur(12px);
    }

    .control-dock summary {
      list-style: none;
      cursor: pointer;
      padding: 0.9vh 1vw;
      color: var(--muted);
      font-size: clamp(0.9rem, 0.9vw, 1rem);
      text-align: right;
    }

    .control-dock summary::-webkit-details-marker {
      display: none;
    }

    .control-inner {
      padding: 0 1vw 1vw;
      display: grid;
      gap: 0.9vh;
    }

    .calendar-status {
      font-size: clamp(0.88rem, 0.9vw, 0.98rem);
      color: var(--muted);
      line-height: 1.5;
    }

    .settings {
      display: grid;
      gap: 0.8vh;
    }

    .settings label {
      display: grid;
      gap: 0.45vh;
      font-size: clamp(0.9rem, 0.9vw, 0.98rem);
      color: var(--muted);
    }

    .settings input {
      width: 100%;
      border: 1px solid rgba(18, 32, 43, 0.14);
      border-radius: 0.9vw;
      padding: 0.9vh 0.85vw;
      font: inherit;
      color: var(--text);
      background: rgba(255, 255, 255, 0.88);
    }

    .settings button {
      justify-self: start;
      background: var(--text);
      color: white;
    }

    .tiny {
      font-size: clamp(0.82rem, 0.82vw, 0.9rem);
      color: var(--muted);
      margin: 0;
      line-height: 1.5;
    }

    .debug-panel {
      border-radius: 1vw;
      background: rgba(18, 32, 43, 0.04);
      border: 1px solid rgba(18, 32, 43, 0.08);
    }

    .debug-panel summary {
      cursor: pointer;
      padding: 0.8vh 0.8vw;
      font-weight: 600;
      color: var(--text);
      text-align: left;
    }

    .debug-output {
      margin: 0;
      padding: 0 0.8vw 0.8vw;
      max-height: 16vh;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: clamp(0.76rem, 0.75vw, 0.84rem);
      line-height: 1.45;
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      body {
        overflow: auto;
      }

      .tv-shell {
        padding: 18px;
      }

      .dashboard {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .control-dock {
        position: static;
        width: 100%;
        margin-bottom: 16px;
      }

      .schedule-topbar,
      .event-card {
        grid-template-columns: 1fr;
      }

      .schedule-actions {
        justify-content: flex-start;
      }

      .event-location {
        justify-self: start;
      }
    }
  </style>
</head>
<body>
  <div class="tv-shell">
    <aside class="control-dock">
      <details>
        <summary>Calendar 設定</summary>
        <div class="control-inner">
          <div class="calendar-status" id="calendar-status">等待 Google Calendar 設定。</div>

          <form class="settings" id="config-form">
            <label>
              自選日子
              <input id="selected-date" type="date">
            </label>
            <label>
              Google API Key
              <input id="api-key" name="api-key" type="text" placeholder="輸入 Google API Key" autocomplete="off">
            </label>
            <label>
              Calendar ID
              <input id="calendar-id" name="calendar-id" type="text" placeholder="例如 example@gmail.com 或群組 calendar id" autocomplete="off">
            </label>
            <button type="submit">更新日曆來源</button>
            <p class="tiny">
              此頁面使用 Google Calendar JSON API。私人事件通常只會回傳時間，不會回傳標題與地點。
            </p>
            <p class="tiny">
              狀態標記建議：取消可直接在 Google Calendar 取消事件，或在標題/描述加入 `#已取消`；改期可在標題或描述加入 `#已改期`。
            </p>
          </form>

          <details class="debug-panel">
            <summary>除錯資訊</summary>
            <pre class="debug-output" id="debug-output">尚未載入事件。</pre>
          </details>
        </div>
      </details>
    </aside>

    <main class="dashboard">
      <section class="panel hero">
        <div>
          <span class="eyebrow">Center Schedule</span>
          <div class="date-block">
            <h1 id="today-date">載入中...</h1>
            <p id="today-weekday">請稍候</p>
            <div class="clock" id="clock">--:--:--</div>
          </div>
        </div>

        <div class="project-name">STTIT - 中心課表dashboard</div>
      </section>

      <section class="panel schedule">
        <div class="schedule-topbar">
          <div class="schedule-heading">
            <h2 id="schedule-title">今日課表</h2>
            <p id="schedule-subtitle">顯示所選日期的課堂安排、時間與地點。</p>
          </div>

          <div class="schedule-actions">
            <button class="ghost-button" id="today-button" type="button">返回今天</button>
            <button class="refresh-button" id="refresh-button" type="button">重新整理</button>
          </div>
        </div>

        <div class="schedule-board">
          <div id="schedule-content" class="empty-state">
            正在準備課表畫面。
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const defaultConfig = {
      apiKey: "AIzaSyC7xa7xqApdg-9cMoTeXDzNmCd-an8Rc6M",
      calendarId: "083ec7d7bd60163ad48c541f1489d74d794f914782549f378b55780c19d28719@group.calendar.google.com"
    };

    const storageKeys = {
      apiKey: "sttit-google-api-key",
      calendarId: "sttit-google-calendar-id"
    };

    const todayDateEl = document.getElementById("today-date");
    const todayWeekdayEl = document.getElementById("today-weekday");
    const clockEl = document.getElementById("clock");
    const scheduleTitleEl = document.getElementById("schedule-title");
    const scheduleSubtitleEl = document.getElementById("schedule-subtitle");
    const scheduleContentEl = document.getElementById("schedule-content");
    const calendarStatusEl = document.getElementById("calendar-status");
    const configForm = document.getElementById("config-form");
    const refreshButton = document.getElementById("refresh-button");
    const todayButton = document.getElementById("today-button");
    const dateInput = document.getElementById("selected-date");
    const apiKeyInput = document.getElementById("api-key");
    const calendarIdInput = document.getElementById("calendar-id");
    const debugOutputEl = document.getElementById("debug-output");

    function getConfig() {
      return {
        apiKey: localStorage.getItem(storageKeys.apiKey) || defaultConfig.apiKey,
        calendarId: localStorage.getItem(storageKeys.calendarId) || defaultConfig.calendarId
      };
    }

    function getTodayInputValue() {
      const now = new Date();
      const offset = now.getTimezoneOffset();
      const local = new Date(now.getTime() - offset * 60000);
      return local.toISOString().slice(0, 10);
    }

    function getSelectedDateValue() {
      return dateInput.value || getTodayInputValue();
    }

    function parseLocalDate(dateValue) {
      const [year, month, day] = dateValue.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function formatDisplayDate(dateValue) {
      const date = parseLocalDate(dateValue);
      return {
        monthDay: date.toLocaleDateString("zh-TW", {
          month: "long",
          day: "numeric"
        }),
        full: date.toLocaleDateString("zh-TW", {
          year: "numeric",
          month: "long",
          day: "numeric",
          weekday: "long"
        })
      };
    }

    function isToday(dateValue) {
      return dateValue === getTodayInputValue();
    }

    function updateHeaderDate() {
      const selectedDate = getSelectedDateValue();
      const formatted = formatDisplayDate(selectedDate);

      todayDateEl.textContent = formatted.monthDay;
      todayWeekdayEl.textContent = formatted.full;
      scheduleTitleEl.textContent = isToday(selectedDate) ? "今日課表" : `${formatted.monthDay} 課表`;
      scheduleSubtitleEl.textContent = isToday(selectedDate)
        ? "顯示今天的課堂安排、時間與地點。"
        : `顯示 ${formatted.full} 的課堂安排、時間與地點。`;
    }

    function updateClock() {
      const now = new Date();
      clockEl.textContent = now.toLocaleTimeString("zh-TW", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });
    }

    function getDayWindow(dateValue) {
      const selected = parseLocalDate(dateValue);
      const start = new Date(selected);
      start.setHours(0, 0, 0, 0);

      const end = new Date(selected);
      end.setHours(23, 59, 59, 999);

      return {
        timeMin: start.toISOString(),
        timeMax: end.toISOString()
      };
    }

    function formatEventTime(event) {
      if (event.start.date && event.end.date) {
        return "全天";
      }

      const start = new Date(event.start.dateTime);
      const end = new Date(event.end.dateTime);

      return `${start.toLocaleTimeString("zh-TW", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      })} - ${end.toLocaleTimeString("zh-TW", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      })}`;
    }

    function getEventTitle(event) {
      if (event.summary) {
        return event.summary;
      }

      if (event.visibility === "private") {
        return "私人事件";
      }

      return "未命名事件";
    }

    function getEventNote(event) {
      if (event.visibility === "private" && !event.summary) {
        return "此事件被設為私人，Google 不會公開標題與詳細內容。";
      }

      return event.description || "";
    }

    function getStatusSourceText(event) {
      return `${event.summary || ""}\n${event.description || ""}`.toLowerCase();
    }

    function getEventState(event) {
      const sourceText = getStatusSourceText(event);

      if (
        event.status === "cancelled" ||
        sourceText.includes("#已取消") ||
        sourceText.includes("[已取消]") ||
        sourceText.includes("已取消") ||
        sourceText.includes("#cancelled") ||
        sourceText.includes("[cancelled]")
      ) {
        return "cancelled";
      }

      if (
        sourceText.includes("#已改期") ||
        sourceText.includes("[已改期]") ||
        sourceText.includes("已改期") ||
        sourceText.includes("#rescheduled") ||
        sourceText.includes("[rescheduled]") ||
        sourceText.includes("rescheduled")
      ) {
        return "rescheduled";
      }

      return "normal";
    }

    function updateDebugOutput(payload) {
      debugOutputEl.textContent = JSON.stringify(payload, null, 2);
    }

    function renderEvents(events) {
      if (!events.length) {
        scheduleContentEl.className = "empty-state";
        scheduleContentEl.textContent = "所選日期沒有安排事件。";
        return;
      }

      const list = document.createElement("div");
      list.className = "calendar-list";

      events.forEach((event) => {
        const card = document.createElement("article");
        card.className = "event-card";
        const eventState = getEventState(event);

        if (eventState !== "normal") {
          card.classList.add("is-muted");
        }

        const time = document.createElement("div");
        time.className = "event-time";
        time.textContent = formatEventTime(event);

        const main = document.createElement("div");
        main.className = "event-main";

        const title = document.createElement("h3");
        title.className = "event-title";
        title.textContent = getEventTitle(event);

        const note = document.createElement("div");
        note.className = "event-note";
        note.textContent = getEventNote(event);

        const flags = document.createElement("div");
        flags.className = "event-flags";

        if (eventState === "cancelled") {
          const cancelledFlag = document.createElement("span");
          cancelledFlag.className = "event-flag is-cancelled";
          cancelledFlag.textContent = "已取消";
          flags.appendChild(cancelledFlag);
        }

        if (eventState === "rescheduled") {
          const rescheduledFlag = document.createElement("span");
          rescheduledFlag.className = "event-flag is-rescheduled";
          rescheduledFlag.textContent = "已改期";
          flags.appendChild(rescheduledFlag);
        }

        main.appendChild(title);
        if (note.textContent) {
          main.appendChild(note);
        }
        if (flags.childElementCount) {
          main.appendChild(flags);
        }

        const location = document.createElement("div");
        location.className = "event-location";
        location.textContent = event.location || "未提供地點";

        card.append(time, main, location);
        list.appendChild(card);
      });

      scheduleContentEl.className = "";
      scheduleContentEl.innerHTML = "";
      scheduleContentEl.appendChild(list);
    }

    function renderError(message) {
      scheduleContentEl.className = "error-state";
      scheduleContentEl.textContent = message;
    }

    async function loadEvents() {
      const selectedDate = getSelectedDateValue();
      const { apiKey, calendarId } = getConfig();

      apiKeyInput.value = apiKey;
      calendarIdInput.value = calendarId;
      updateHeaderDate();

      if (!apiKey || !calendarId) {
        calendarStatusEl.textContent = "尚未完成 Google Calendar 設定。";
        updateDebugOutput({
          configured: false,
          reason: "missing_api_key_or_calendar_id"
        });
        renderError("請先輸入 Google API Key 與 Calendar ID。");
        return;
      }

      calendarStatusEl.textContent = `正在從 ${calendarId} 載入 ${selectedDate} 的事件。`;
      scheduleContentEl.className = "empty-state";
      scheduleContentEl.textContent = "正在載入所選日期的課表...";

      const { timeMin, timeMax } = getDayWindow(selectedDate);
      const url = new URL(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(calendarId)}/events`);
      url.searchParams.set("key", apiKey);
      url.searchParams.set("singleEvents", "true");
      url.searchParams.set("orderBy", "startTime");
      url.searchParams.set("timeMin", timeMin);
      url.searchParams.set("timeMax", timeMax);

      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`Google Calendar API 回應狀態 ${response.status}`);
        }

        const data = await response.json();
        updateDebugOutput({
          configured: true,
          calendarId,
          selectedDate,
          itemCount: (data.items || []).length,
          items: (data.items || []).map((event) => ({
            id: event.id,
            status: event.status,
            summary: event.summary,
            description: event.description,
            location: event.location,
            start: event.start,
            end: event.end,
            visibility: event.visibility,
            derivedState: getEventState(event),
            htmlLink: event.htmlLink
          }))
        });
        renderEvents(data.items || []);
        calendarStatusEl.textContent = `${selectedDate} 共載入 ${(data.items || []).length} 筆事件。`;
      } catch (error) {
        updateDebugOutput({
          configured: true,
          calendarId,
          selectedDate,
          error: error.message || "載入事件失敗"
        });
        renderError(error.message || "載入事件失敗。");
        calendarStatusEl.textContent = "無法載入 Google Calendar 事件。";
      }
    }

    configForm.addEventListener("submit", (event) => {
      event.preventDefault();
      localStorage.setItem(storageKeys.apiKey, apiKeyInput.value.trim());
      localStorage.setItem(storageKeys.calendarId, calendarIdInput.value.trim());
      loadEvents();
    });

    refreshButton.addEventListener("click", loadEvents);

    todayButton.addEventListener("click", () => {
      dateInput.value = getTodayInputValue();
      loadEvents();
    });

    dateInput.addEventListener("change", loadEvents);

    dateInput.value = getTodayInputValue();
    updateHeaderDate();
    updateClock();
    loadEvents();
    setInterval(updateClock, 1000);
    setInterval(loadEvents, 60000);
  </script>
</body>
</html>
